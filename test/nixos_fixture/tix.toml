# Fixture tix.toml for testing NixOS/Home Manager context completion.
#
# Usage:
#   cargo run --bin tix -- test/nixos_fixture/hosts/desktop/gaming.nix \
#       --stubs test/nixos_fixture/stubs/nixos.tix

[context.nixos]
includes = ["hosts/**/*.nix", "common/*.nix"]
stubs = ["@nixos"]

[context.home]
includes = ["common/homemanager/**/*.nix", "home/**/*.nix"]
stubs = ["@home-manager"]
